# TechLead Configuration

# Agent settings
agent:
  provider: auto  # auto | claude | codex
  model: sonnet   # For claude: sonnet, opus | For codex: gpt-4o, etc.
  max_budget_usd: 2.0
  timeout_ms: 300000  # 5 minutes
  
  # Allowed tools (for claude)
  allowed_tools:
    - Read
    - Edit
    - Bash
    - Glob

# Task defaults
task:
  default_status: backlog
  auto_retry_failed: true

# Execution settings
execution:
  step_timeout_ms: 300000
  max_steps_per_task: 50
  verify_commands:
    - pnpm test
    - pnpm typecheck
    - pnpm lint
