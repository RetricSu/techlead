name: Sprint Board CLI
# CLI flows executed by scripts/test-cli-flows.mjs.
# Flows that mutate state use isolated_state: true to get a temporary copy
# of the sprint state file, preventing pollution of the real sprint state.

flows:
  - name: "add: creates task with sequential ID"
    command: "node"
    args: ["scripts/sprint-board.mjs", "add", "--title", "Smoke task", "--priority", "P2"]
    isolated_state: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Task added"]
      should:
        - stdout_contains: ["AP-"]

  - name: "add: rejects invalid priority"
    command: "node"
    args: ["scripts/sprint-board.mjs", "add", "--title", "Bad", "--priority", "PX"]
    isolated_state: true
    assert:
      must:
        - exit_code_nonzero: true
        - stderr_contains: ["Invalid priority"]
      should: []

  - name: "update: transitions task state"
    command: "node"
    args: ["scripts/sprint-board.mjs", "update", "--id", "AP-004", "--state", "In Progress"]
    isolated_state: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Task updated"]
      should:
        - stdout_contains: ["In Progress"]

  - name: "update: rejects unknown task ID"
    command: "node"
    args: ["scripts/sprint-board.mjs", "update", "--id", "BOGUS-999", "--state", "Done"]
    isolated_state: true
    assert:
      must:
        - exit_code_nonzero: true
        - stderr_contains: ["Task not found"]
      should: []

  - name: "journal: appends entry"
    command: "node"
    args:
      - "scripts/sprint-board.mjs"
      - "journal"
      - "--task"
      - "AP-004"
      - "--summary"
      - "cli-flow test entry"
    isolated_journal: true
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Journal updated"]
      should: []

  - name: "next: returns next actionable task"
    command: "node"
    args: ["scripts/sprint-board.mjs", "next"]
    assert:
      must:
        - exit_code: 0
        - stdout_not_empty: true
      should:
        - stdout_not_contains: ["Error:", "stack trace"]

  - name: "next --json: returns parseable JSON"
    command: "node"
    args: ["scripts/sprint-board.mjs", "next", "--json"]
    assert:
      must:
        - exit_code: 0
        - stdout_json_parseable: true
      should: []

  - name: "summary: prints counts"
    command: "node"
    args: ["scripts/sprint-board.mjs", "summary"]
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Sprint Summary", "Backlog", "Done"]
      should: []

  - name: "--help: exits 0 and prints usage"
    command: "node"
    args: ["scripts/sprint-board.mjs", "--help"]
    assert:
      must:
        - exit_code: 0
        - stdout_contains: ["Usage", "add", "update", "journal", "next"]
      should: []
